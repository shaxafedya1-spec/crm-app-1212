<!DOCTYPE html>
<html>
<head>
    <title>CRM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #f0f0f0; padding: 20px; text-align: center; }
        button { background: blue; color: white; padding: 15px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; width: 90%; font-size: 18px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; }
        input, select { width: 95%; padding: 10px; margin: 5px 0; font-size: 16px; }
    </style>
</head>
<body>
    <h1>🤖 CRM Бот</h1>
    <button onclick="showAdd()">➕ Добавить</button>
    <button onclick="showList()">📋 Список</button>
    <button onclick="showStats()">📊 Статистика</button>
    <div id="content"></div>
    <script>
        let clients = [];
        let nextId = 1;
        function save() { localStorage.setItem('clients', JSON.stringify(clients)); localStorage.setItem('nextId', nextId); }
        function load() { let s = localStorage.getItem('clients'); if(s) clients = JSON.parse(s); let i = localStorage.getItem('nextId'); if(i) nextId = parseInt(i); }
        function showAdd() {
            document.getElementById('content').innerHTML = '<div class="card"><h3>➕ Новый</h3><input id="name" placeholder="Имя"><input id="phone" placeholder="Телефон"><select id="status"><option>Новый</option><option>В работе</option><option>Договор</option><option>Закрыт</option></select><button onclick="add()">Сохранить</button></div>';
        }
        function add() {
            let name = document.getElementById('name').value;
            if(!name) { alert('Введите имя'); return; }
            clients.push({ id: nextId++, name: name, phone: document.getElementById('phone').value || '—', status: document.getElementById('status').value });
            save(); showList();
        }
        function showList() {
            if(clients.length === 0) { document.getElementById('content').innerHTML = '<div class="card">📭 Нет клиентов</div>'; return; }
            let html = '';
            for(let c of clients) {
                html += '<div class="card"><b>' + c.name + '</b><br>📞 ' + c.phone + '<br>📌 ' + c.status + '<br><button onclick="view(' + c.id + ')">👤 Подробнее</button></div>';
            }
            document.getElementById('content').innerHTML = html;
        }
        function view(id) {
            let c = clients.find(x => x.id === id);
            document.getElementById('content').innerHTML = '<div class="card"><h3>' + c.name + '</h3><p>📞 ' + c.phone + '</p><p>📌 ' + c.status + '</p><select id="ns"><option>Новый</option><option>В работе</option><option>Договор</option><option>Закрыт</option></select><button onclick="change(' + c.id + ')">Изменить</button><button onclick="showList()">◀️ Назад</button></div>';
        }
        function change(id) {
            let c = clients.find(x => x.id === id);
            c.status = document.getElementById('ns').value;
            save(); view(id);
        }
        function showStats() {
            let total = clients.length;
            document.getElementById('content').innerHTML = '<div class="card">📊 Всего клиентов: ' + total + '</div>';
        }
        load(); showList();
    </script>
</body>
</html>
