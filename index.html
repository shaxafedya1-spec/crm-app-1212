<!DOCTYPE html>
<html>
<head>
    <title>Neostyle CRM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; }
        
        /* Шапка */
        .header { background: #111; border-radius: 28px; padding: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .logo { font-size: 32px; font-weight: bold; }
        .logo span:first-child { color: #ffffff; }
        .logo span:last-child { color: #ffd700; }
        .sub { font-size: 12px; color: #aaa; margin-top: 5px; letter-spacing: 2px; }
        
        /* Кнопки фильтров */
        .filter-buttons { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { flex: 1; background: #1a1a1a; border: none; padding: 10px; border-radius: 30px; color: #ccc; cursor: pointer; font-weight: 600; }
        .filter-btn.active { background: #ffd700; color: #111; }
        
        /* Меню кнопки */
        .menu-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .menu-btn { flex: 1; background: #1a1a1a; border: none; padding: 14px; border-radius: 16px; color: white; cursor: pointer; font-weight: 600; border: 1px solid #333; }
        .menu-btn.add { background: #ffd700; color: #111; border: none; }
        .menu-btn.clear { background: #2a2a2a; color: #ff6666; }
        
        /* Карточки */
        .card { background: #111; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #333; }
        .client-card { background: #111; border-radius: 20px; padding: 16px; margin-bottom: 12px; cursor: pointer; border-left: 4px solid #ffd700; border: 1px solid #333; }
        .client-name { font-size: 18px; font-weight: bold; color: #fff; }
        .client-number { background: #ffd700; color: #111; border-radius: 20px; padding: 4px 12px; font-size: 12px; display: inline-block; font-weight: bold; }
        .client-info { font-size: 14px; color: #ccc; margin-top: 8px; }
        
        /* Цветные статусы */
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-new { background: #1a3a5c; color: #66ccff; }
        .status-work { background: #5c3a1a; color: #ffcc66; }
        .status-deal { background: #1a5c2a; color: #66ff88; }
        .status-closed { background: #3a3a3a; color: #ccc; }
        
        /* Поля ввода - СВЕТЛЫЙ ТЕКСТ */
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #ffd700; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #444; border-radius: 14px; background: #1a1a1a; color: #ffffff; font-size: 16px; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ffd700; background: #222; }
        textarea { resize: vertical; min-height: 80px; }
        
        /* Список подсказок улиц */
        .suggestions { background: #1a1a1a; border-radius: 14px; margin-top: 5px; max-height: 150px; overflow-y: auto; border: 1px solid #333; }
        .suggestion-item { padding: 12px; cursor: pointer; color: #ddd; border-bottom: 1px solid #333; }
        .suggestion-item:hover { background: #ffd700; color: #111; }
        
        /* Кнопки */
        .save-btn { background: #ffd700; color: #111; border: none; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .upload-btn { background: #2a4a2a; color: #fff; border: none; padding: 12px; border-radius: 16px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* Файлы */
        .file-list { margin-top: 10px; padding: 10px; background: #1a1a1a; border-radius: 12px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; }
        .file-name { color: #ffd700; font-size: 12px; }
        .delete-file { background: none; border: none; color: #ff6666; cursor: pointer; font-size: 16px; }
        
        /* Диаграмма */
        .chart-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .chart-label { width: 80px; color: #ccc; }
        .chart-fill { height: 24px; border-radius: 12px; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .number-badge { background: #ffd700; color: #111; border-radius: 30px; padding: 8px 16px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        hr { border-color: #333; margin: 20px 0; }
        .deal-files { margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        
        /* Текст на чёрном фоне - ВЕЗДЕ БЕЛЫЙ */
        p, h3, .client-name, .client-info, .empty-state { color: #fff; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo"><span>NEO</span><span>STYLE</span></div>
        <div class="sub">ARCHITECTURAL GROUP</div>
    </div>
    
    <div class="filter-buttons">
        <button class="filter-btn active" onclick="setFilter('all')">📋 Все</button>
        <button class="filter-btn" onclick="setFilter('Новый')">🟢 Новые</button>
        <button class="filter-btn" onclick="setFilter('В работе')">🟡 В работе</button>
        <button class="filter-btn" onclick="setFilter('Договор')">🔵 Договор</button>
        <button class="filter-btn" onclick="setFilter('Закрыт')">✅ Закрыты</button>
    </div>
    
    <div class="menu-buttons">
        <button class="menu-btn add" onclick="showAdd()">➕ Добавить</button>
        <button class="menu-btn" onclick="showList()">📋 Список</button>
        <button class="menu-btn" onclick="showStats()">📊 Статистика</button>
        <button class="menu-btn clear" onclick="clearAll()">🗑️ Очистить</button>
    </div>
    <div id="content"></div>
</div>
<script>
let clients = [], nextNumber = 1, currentFilter = 'all';

// Улицы Ташкента для автоподсказок
const streets = [
    "Амира Темура", "Мустакиллик", "Навои", "Пушкина", "Буюк Ипак Йули",
    "Фаробий", "Чиланзар", "Сергели", "Юнусабад", "Мирабад",
    "Шота Руставели", "Тараккиёт", "Беруни", "Афросиаб", "Заркент",
    "Олмазор", "Карасу", "Куйлюк", "Сагбан", "Узбекистон Овози"
];

function getStreetSuggestions(input) {
    if(!input) return [];
    let lower = input.toLowerCase();
    return streets.filter(s => s.toLowerCase().includes(lower)).slice(0, 5);
}

function showAddressSuggestions(inputId, containerId) {
    let input = document.getElementById(inputId);
    let val = input.value;
    let suggestions = getStreetSuggestions(val);
    let container = document.getElementById(containerId);
    if(suggestions.length === 0) { container.innerHTML = ''; return; }
    let html = '<div class="suggestions">';
    for(let s of suggestions) {
        html += `<div class="suggestion-item" onclick="selectAddress('${inputId}', '${s.replace(/'/g, "\\'")}')">🏠 ${s}</div>`;
    }
    html += '</div>';
    container.innerHTML = html;
}

function selectAddress(inputId, value) {
    document.getElementById(inputId).value = value;
    document.getElementById('address-suggestions').innerHTML = '';
}

function formatNumber(num) {
    // Узбекская нумерация (пробел каждые 3 цифры)
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
}

function load() { 
    let s = localStorage.getItem('clients'); 
    if(s) clients = JSON.parse(s); 
    let n = localStorage.getItem('nextNumber'); 
    if(n) nextNumber = parseInt(n); 
    if(clients.length) nextNumber = Math.max(nextNumber, Math.max(...clients.map(c=>c.number))+1);
}
function save() { localStorage.setItem('clients', JSON.stringify(clients)); localStorage.setItem('nextNumber', nextNumber); }

const CHAT_ID = -1003831665624, BOT_TOKEN = "8628159718:AAH8tPnTX0fReDzpByMG44A-iF6HG-Pm5-8";

async function sendFileToGroup(fileData, client, customCaption = '') {
    try {
        let byteCharacters = atob(fileData.data.split(',')[1]);
        let byteNumbers = new Array(byteCharacters.length);
        for(let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
        let byteArray = new Uint8Array(byteNumbers);
        let blob = new Blob([byteArray], {type: fileData.type});
        let formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('document', blob, fileData.name);
        let caption = customCaption || `📎 ${fileData.name} | Клиент #${client.number} - ${client.name}`;
        formData.append('caption', caption);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {method: 'POST', body: formData});
    } catch(e) { console.log(e); }
}

async function sendToGroup(c, isChange, newFiles = []) {
    let t = isChange ? 'ИЗМЕНЕНИЕ СТАТУСА' : 'НОВЫЙ КЛИЕНТ #'+c.number;
    let m = `🆕 *${t}*%0A%0A📛 *Имя:* ${c.name}%0A📞 *Телефон:* ${c.phone}%0A📐 *Площадь:* ${c.area} м²%0A📍 *Адрес:* ${c.address}%0A📌 *Статус:* ${c.status}%0A💬 *Комментарий:* ${c.comment}`;
    let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${m}&parse_mode=Markdown`;
    try { await fetch(url); } catch(e) { console.log(e); }
    for(let file of newFiles) await sendFileToGroup(file, c);
}

function setFilter(s) { currentFilter = s; document.querySelectorAll('.filter-btn').forEach((btn,i)=>btn.classList.toggle('active', btn.innerText === s || (s==='all' && btn.innerText==='Все'))); showList(); }
function getFiltered() { return currentFilter === 'all' ? clients : clients.filter(c => c.status === currentFilter); }
function clearAll() { if(confirm('Удалить всех клиентов?')) { clients = []; nextNumber = 1; save(); showList(); } }

function showAdd() {
    document.getElementById('content').innerHTML = `<div class="card"><div class="number-badge">Новый клиент → #${formatNumber(nextNumber)}</div>
        <div class="input-group"><label>📛 Имя клиента *</label><input id="name" placeholder="Ислом Каримов"></div>
        <div class="input-group"><label>📞 Телефон</label><input id="phone" placeholder="+998 90 123 45 67"></div>
        <div class="input-group"><label>📐 Площадь (м²)</label><input id="area" placeholder="75" type="number"></div>
        <div class="input-group"><label>📍 Адрес объекта</label><input id="address" placeholder="Начните вводить улицу..." oninput="showAddressSuggestions('address', 'address-suggestions')"></div>
        <div id="address-suggestions"></div>
        <div class="input-group"><label>📌 Статус</label><select id="status"><option>Новый</option><option>В работе</option><option>Договор</option><option>Закрыт</option></select></div>
        <div class="input-group"><label>💬 Комментарий</label><textarea id="comment" rows="3" placeholder="Дополнительная информация..."></textarea></div>
        <div class="input-group"><label>📎 Файлы (договор, смета, фото)</label><input type="file" id="files" multiple accept=".pdf,.doc,.docx,.jpg,.png,.xlsx"></div>
        <button class="save-btn" onclick="add()">✅ Сохранить</button></div>`;
}

async function add() {
    let name = document.getElementById('name').value;
    if(!name) { alert('Введите имя клиента'); return; }
    let files = document.getElementById('files').files;
    let fileDataArray = [];
    for(let file of files) {
        let reader = new FileReader();
        let data = await new Promise(resolve => { reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
        fileDataArray.push({name: file.name, type: file.type, data: data});
    }
    let c = { number: nextNumber, name: name, phone: document.getElementById('phone').value || '—', area: document.getElementById('area').value || '—', address: document.getElementById('address').value || '—', status: document.getElementById('status').value, comment: document.getElementById('comment').value || '—', time: new Date().toLocaleString('ru-RU'), files: fileDataArray, dealFiles: [] };
    clients.push(c); save(); await sendToGroup(c, false, fileDataArray); nextNumber++; showList();
    alert(`✅ Клиент #${formatNumber(c.number)} добавлен!`);
}

function showList() {
    let filtered = getFiltered();
    if(!filtered.length) { document.getElementById('content').innerHTML = '<div class="card empty-state">📭 Нет клиентов</div>'; return; }
    let html = '';
    for(let c of filtered) {
        let cls = c.status === 'Новый' ? 'status-new' : (c.status === 'В работе' ? 'status-work' : (c.status === 'Договор' ? 'status-deal' : 'status-closed'));
        let fileCount = (c.files ? c.files.length : 0) + (c.dealFiles ? c.dealFiles.length : 0);
        html += `<div class="client-card" onclick="view(${c.number})"><div class="client-number">#${formatNumber(c.number)}</div><div class="client-name">${c.name}</div><div class="client-info">📞 ${c.phone} | 📐 ${c.area} м² | 📎 ${fileCount}</div><div><span class="status-badge ${cls}">${c.status}</span></div></div>`;
    }
    document.getElementById('content').innerHTML = html;
}

function view(n) {
    let c = clients.find(x=>x.number===n);
    let cls = c.status === 'Новый' ? 'status-new' : (c.status === 'В работе' ? 'status-work' : (c.status === 'Договор' ? 'status-deal' : 'status-closed'));
    
    let filesHtml = '';
    if(c.files && c.files.length) {
        filesHtml += '<div class="file-list"><b>📎 Общие файлы:</b>';
        for(let f of c.files) filesHtml += `<div class="file-item"><span class="file-name">📄 ${f.name}</span><button class="delete-file" onclick="event.stopPropagation(); deleteFile(${n}, '${f.name}', 'files')">🗑️</button></div>`;
        filesHtml += '</div>';
    }
    
    let dealFilesHtml = '';
    if(c.dealFiles && c.dealFiles.length) {
        dealFilesHtml += '<div class="file-list deal-files"><b>📄 ДОГОВОРЫ:</b>';
        for(let f of c.dealFiles) dealFilesHtml += `<div class="file-item"><span class="file-name">📑 ${f.name}</span><button class="delete-file" onclick="event.stopPropagation(); deleteFile(${n}, '${f.name}', 'dealFiles')">🗑️</button></div>`;
        dealFilesHtml += '</div>';
    }
    
    let dealUploadHtml = c.status === 'Договор' ? `<div class="deal-files"><label style="color:#ffd700;">📄 Загрузить договор (PDF, DOC)</label><input type="file" id="dealFile" accept=".pdf,.doc,.docx"><button class="upload-btn" onclick="addDealFile(${n})">📤 Загрузить договор</button></div>` : '';
    
    document.getElementById('content').innerHTML = `<div class="card"><div class="number-badge">Клиент #${formatNumber(c.number)}</div><h3 style="color:#fff;">${c.name}</h3>
        <p style="color:#ccc;">📞 ${c.phone}</p><p style="color:#ccc;">📐 ${c.area} м²</p><p style="color:#ccc;">📍 ${c.address}</p><p><span class="status-badge ${cls}">${c.status}</span></p><p style="color:#ccc;">💬 ${c.comment}</p><p style="color:#ccc;">🕐 ${c.time}</p>${filesHtml}${dealFilesHtml}${dealUploadHtml}
        <div class="input-group"><label style="color:#ffd700;">📎 Добавить файл</label><input type="file" id="newFile" accept=".pdf,.doc,.docx,.jpg,.png,.xlsx"></div>
        <button class="upload-btn" onclick="addFile(${n})">📤 Добавить файл</button>
        <select id="ns" style="margin-top:15px;"><option ${c.status==='Новый'?'selected':''}>Новый</option><option ${c.status==='В работе'?'selected':''}>В работе</option><option ${c.status==='Договор'?'selected':''}>Договор</option><option ${c.status==='Закрыт'?'selected':''}>Закрыт</option></select>
        <button class="save-btn" onclick="change(${c.number})">🔄 Изменить статус</button>
        <button class="save-btn" style="background:#2a2a2a;color:white;margin-top:10px;" onclick="showList()">◀️ Назад</button></div>`;
}

async function addFile(n) {
    let c = clients.find(x=>x.number===n);
    let file = document.getElementById('newFile').files[0];
    if(!file) { alert('Выберите файл'); return; }
    let reader = new FileReader();
    let data = await new Promise(resolve => { reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
    let fileData = {name: file.name, type: file.type, data: data};
    if(!c.files) c.files = [];
    c.files.push(fileData);
    save();
    await sendFileToGroup(fileData, c);
    alert(`✅ Файл "${file.name}" добавлен и отправлен в группу!`);
    view(n);
}

async function addDealFile(n) {
    let c = clients.find(x=>x.number===n);
    let file = document.getElementById('dealFile').files[0];
    if(!file) { alert('Выберите файл договора'); return; }
    if(c.status !== 'Договор') { alert('❗Статус клиента должен быть "Договор"'); return; }
    let reader = new FileReader();
    let data = await new Promise(resolve => { reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
    let fileData = {name: file.name, type: file.type, data: data};
    if(!c.dealFiles) c.dealFiles = [];
    c.dealFiles.push(fileData);
    save();
    await sendFileToGroup(fileData, c, `📄 ДОГОВОР клиента #${formatNumber(c.number)} - ${c.name}`);
    alert(`✅ Договор "${file.name}" добавлен и отправлен в группу!`);
    view(n);
}

function deleteFile(n, fileName, type) {
    let c = clients.find(x=>x.number===n);
    c[type] = c[type].filter(f => f.name !== fileName);
    save();
    view(n);
}

async function change(n) {
    let c = clients.find(x=>x.number===n);
    let old = c.status;
    let newStatus = document.getElementById('ns').value;
    c.status = newStatus;
    save();
    if(old !== newStatus) { 
        await sendToGroup(c, true); 
        alert(`✅ Статус изменён с "${old}" на "${newStatus}"!`);
        if(newStatus === 'Договор') {
            alert(`📄 Теперь можно загрузить договор для клиента #${formatNumber(c.number)}`);
        }
    }
    view(n);
}

function showStats() {
    let total = clients.length, newC = clients.filter(c=>c.status==='Новый').length, workC = clients.filter(c=>c.status==='В работе').length, dealC = clients.filter(c=>c.status==='Договор').length, closedC = clients.filter(c=>c.status==='Закрыт').length, areaTotal = 0, fileTotal = 0;
    clients.forEach(c => { if(c.area !== '—') areaTotal += parseFloat(c.area) || 0; if(c.files) fileTotal += c.files.length; if(c.dealFiles) fileTotal += c.dealFiles.length; });
    let maxC = Math.max(newC, workC, dealC, closedC, 1);
    document.getElementById('content').innerHTML = `<div class="card"><h3 style="text-align:center;color:#ffd700;">📊 СТАТИСТИКА</h3>
        <p style="color:#fff;">👥 Всего: <b style="color:#ffd700;">${total}</b></p><p style="color:#fff;">📐 Площадь: <b style="color:#ffd700;">${areaTotal} м²</b></p><p style="color:#fff;">📎 Файлов: <b style="color:#ffd700;">${fileTotal}</b></p><hr>
        <div class="chart-bar"><span class="chart-label">🟢 Новые</span><div class="chart-fill" style="width:${(newC/maxC)*100}%;background:#66ccff;"></div><span style="color:#fff;">${newC}</span></div>
        <div class="chart-bar"><span class="chart-label">🟡 В работе</span><div class="chart-fill" style="width:${(workC/maxC)*100}%;background:#ffcc66;"></div><span style="color:#fff;">${workC}</span></div>
        <div class="chart-bar"><span class="chart-label">🔵 Договор</span><div class="chart-fill" style="width:${(dealC/maxC)*100}%;background:#66ff88;"></div><span style="color:#fff;">${dealC}</span></div>
        <div class="chart-bar"><span class="chart-label">✅ Закрыты</span><div class="chart-fill" style="width:${(closedC/maxC)*100}%;background:#aaa;"></div><span style="color:#fff;">${closedC}</span></div>
        <button class="save-btn" style="background:#2a2a2a;color:white;margin-top:20px;" onclick="showList()">◀️ Назад</button></div>`;
}

load(); showList();
</script>
</body>
</html>
