<!DOCTYPE html>
<html>
<head>
    <title>CRM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #f0f0f0; padding: 20px; text-align: center; }
        button { background: blue; color: white; padding: 15px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; width: 90%; font-size: 18px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; }
        input, select { width: 95%; padding: 10px; margin: 5px 0; font-size: 16px; }
        .number { background: #667eea; color: white; border-radius: 20px; padding: 5px 12px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🤖 CRM Бот</h1>
    <button onclick="showAdd()">➕ Добавить</button>
    <button onclick="showList()">📋 Список</button>
    <button onclick="showStats()">📊 Статистика</button>
    <div id="content"></div>
    <script>
        let clients = [];
        let nextNumber = 1;
        
        function save() { 
            localStorage.setItem('clients', JSON.stringify(clients)); 
            localStorage.setItem('nextNumber', nextNumber);
        }
        
        function load() { 
            let s = localStorage.getItem('clients'); 
            if(s) clients = JSON.parse(s); 
            let n = localStorage.getItem('nextNumber'); 
            if(n) nextNumber = parseInt(n);
        }
        
        const CHAT_ID = -1003831665624;
        const BOT_TOKEN = "8628159718:AAH8tPnTX0fReDzpByMG44A-iF6HG-Pm5-8";
        
        async function sendToGroup(client) {
            let message = `🆕 *НОВЫЙ КЛИЕНТ #${client.number}*%0A%0A` +
                          `📛 *Имя:* ${client.name}%0A` +
                          `📞 *Телефон:* ${client.phone}%0A` +
                          `📌 *Статус:* ${client.status}%0A` +
                          `🕐 *Добавлен:* ${client.time}`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${message}&parse_mode=Markdown`;
            
            try {
                let response = await fetch(url);
                let result = await response.json();
                if(result.ok) {
                    alert(`✅ Клиент #${client.number} добавлен и отправлен в группу!`);
                } else {
                    alert("❌ Ошибка: " + result.description);
                }
            } catch(e) {
                alert("❌ Ошибка: " + e.message);
            }
        }
        
        function showAdd() {
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <h3>➕ Новый клиент</h3>
                    <p class="number">Будет номер: #${nextNumber}</p>
                    <input id="name" placeholder="Имя клиента">
                    <input id="phone" placeholder="Телефон">
                    <select id="status">
                        <option>Новый</option>
                        <option>В работе</option>
                        <option>Договор</option>
                        <option>Закрыт</option>
                    </select>
                    <button onclick="add()">Сохранить и отправить в группу</button>
                </div>
            `;
        }
        
        function add() {
            let name = document.getElementById('name').value;
            if(!name) { alert('Введите имя'); return; }
            
            let newClient = {
                number: nextNumber,
                name: name,
                phone: document.getElementById('phone').value || '—',
                status: document.getElementById('status').value,
                time: new Date().toLocaleString()
            };
            
            clients.push(newClient);
            save();
            sendToGroup(newClient);  // Отправляем карточку в группу
            nextNumber++;
            showList();
        }
        
        function showList() {
            if(clients.length === 0) { 
                document.getElementById('content').innerHTML = '<div class="card">📭 Нет клиентов</div>'; 
                return; 
            }
            let html = '';
            for(let c of clients) {
                html += '<div class="card">' +
                    '<b>#' + c.number + ' - ' + c.name + '</b><br>' +
                    '📞 ' + c.phone + '<br>' +
                    '📌 ' + c.status + '<br>' +
                    '<button onclick="view(' + c.number + ')">👤 Подробнее</button>' +
                    '</div>';
            }
            document.getElementById('content').innerHTML = html;
        }
        
        function view(number) {
            let c = clients.find(x => x.number === number);
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <h3>#${c.number} - ${c.name}</h3>
                    <p>📞 ${c.phone}</p>
                    <p>📌 ${c.status}</p>
                    <p>🕐 ${c.time}</p>
                    <select id="ns">
                        <option>Новый</option>
                        <option>В работе</option>
                        <option>Договор</option>
                        <option>Закрыт</option>
                    </select>
                    <button onclick="change(${c.number})">Изменить статус</button>
                    <button onclick="showList()">◀️ Назад</button>
                </div>
            `;
        }
        
        function change(number) {
            let c = clients.find(x => x.number === number);
            c.status = document.getElementById('ns').value;
            save();
            view(number);
        }
        
        function showStats() {
            let total = clients.length;
            document.getElementById('content').innerHTML = '<div class="card">📊 Всего клиентов: ' + total + '</div>';
        }
        
        load();
        showList();
    </script>
</body>
</html>
