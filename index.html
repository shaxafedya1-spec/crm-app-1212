<!DOCTYPE html>
<html>
<head>
    <title>Neostyle CRM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; padding: 20px; font-family: Arial, sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; }
        .header { background: #111; border-radius: 28px; padding: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .logo { font-size: 32px; font-weight: bold; }
        .logo span:first-child { color: #fff; }
        .logo span:last-child { color: #ffd700; }
        .sub { font-size: 12px; color: #aaa; margin-top: 5px; }
        .filter-buttons { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { flex: 1; background: #1a1a1a; border: none; padding: 10px; border-radius: 30px; color: #ccc; cursor: pointer; }
        .filter-btn.active { background: #ffd700; color: #111; }
        .menu-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .menu-btn { flex: 1; background: #1a1a1a; border: none; padding: 14px; border-radius: 16px; color: white; cursor: pointer; }
        .menu-btn.add { background: #ffd700; color: #111; }
        .card { background: #111; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #333; }
        .client-card { background: #111; border-radius: 20px; padding: 16px; margin-bottom: 12px; cursor: pointer; border-left: 4px solid #ffd700; }
        .client-name { font-size: 18px; font-weight: bold; color: #fff; }
        .client-number { background: #ffd700; color: #111; border-radius: 20px; padding: 4px 12px; font-size: 12px; display: inline-block; }
        .client-info { font-size: 14px; color: #ccc; margin-top: 8px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-new { background: #1a3a5c; color: #66ccff; }
        .status-work { background: #5c3a1a; color: #ffcc66; }
        .status-deal { background: #1a5c2a; color: #66ff88; }
        .status-closed { background: #3a3a3a; color: #ccc; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #ffd700; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #444; border-radius: 14px; background: #1a1a1a; color: #fff; font-size: 16px; }
        .save-btn { background: #ffd700; color: #111; border: none; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .upload-btn { background: #2a4a2a; color: #fff; border: none; padding: 12px; border-radius: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
        .file-list { margin-top: 10px; padding: 10px; background: #1a1a1a; border-radius: 12px; }
        .file-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
        .file-name { color: #ffd700; font-size: 12px; }
        .delete-file { background: none; border: none; color: #ff6666; cursor: pointer; }
        .price-badge { background: #ffd700; color: #111; border-radius: 20px; padding: 4px 12px; font-size: 12px; display: inline-block; margin-top: 8px; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .number-badge { background: #ffd700; color: #111; border-radius: 30px; padding: 8px 16px; display: inline-block; margin-bottom: 20px; }
        hr { border-color: #333; margin: 20px 0; }
        p, h3 { color: #fff; }
        .deal-section { border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><div class="logo"><span>NEO</span><span>STYLE</span></div><div class="sub">ARCHITECTURAL GROUP</div></div>
    <div class="filter-buttons">
        <button class="filter-btn active" onclick="setFilter('all')">Все</button>
        <button class="filter-btn" onclick="setFilter('Новый')">Новые</button>
        <button class="filter-btn" onclick="setFilter('В работе')">В работе</button>
        <button class="filter-btn" onclick="setFilter('Договор')">Договор</button>
        <button class="filter-btn" onclick="setFilter('Закрыт')">Закрыты</button>
    </div>
    <div class="menu-buttons">
        <button class="menu-btn add" onclick="showAdd()">➕ Добавить</button>
        <button class="menu-btn" onclick="showList()">📋 Список</button>
        <button class="menu-btn" onclick="showStats()">📊 Статистика</button>
    </div>
    <div id="content"></div>
</div>
<script>
let clients = [], nextNumber = 1, currentFilter = 'all';

function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
function formatPrice(p) { 
    if(p === '—' || !p || p === 'undefined') return '—';
    return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " сум"; 
}

function load() { 
    let s = localStorage.getItem('clients'); 
    if(s) clients = JSON.parse(s); 
    let n = localStorage.getItem('nextNumber'); 
    if(n) nextNumber = parseInt(n); 
}
function save() { localStorage.setItem('clients', JSON.stringify(clients)); localStorage.setItem('nextNumber', nextNumber); }

const CHAT_ID = -1003831665624;
const BOT_TOKEN = "8628159718:AAH8tPnTX0fReDzpByMG44A-iF6HG-Pm5-8";

// Отправка полной карточки в группу
async function sendFullCardToGroup(c, eventType = 'new') {
    let title = '';
    if(eventType === 'new') title = `🆕 НОВЫЙ КЛИЕНТ #${c.number}`;
    else if(eventType === 'status') title = `🔄 ИЗМЕНЕНИЕ СТАТУСА`;
    else if(eventType === 'deal') title = `✅ ПОДПИСАН ДОГОВОР #${c.number}`;
    
    let message = `${title}\n\n`;
    message += `📛 Имя: ${c.name}\n`;
    message += `📞 Телефон: ${c.phone}\n`;
    message += `📐 Площадь: ${c.area} м²\n`;
    message += `📍 Адрес: ${c.address}\n`;
    message += `📌 Статус: ${c.status}\n`;
    if(c.price && c.price !== '—' && c.price !== 'undefined') message += `💰 Сумма: ${formatPrice(c.price)}\n`;
    message += `💬 Комментарий: ${c.comment}\n\n`;
    message += `🕐 ${new Date().toLocaleString()}`;
    
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
    try {
        await fetch(url);
        return true;
    } catch(e) { 
        console.log('Ошибка отправки:', e);
        return false;
    }
}

// Отправка файла в группу
async function sendFileToGroup(fileData, c, fileType = 'file') {
    try {
        let byteChars = atob(fileData.data.split(',')[1]);
        let bytes = new Uint8Array(byteChars.length);
        for(let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
        let blob = new Blob([bytes], {type: fileData.type});
        let fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('document', blob, fileData.name);
        let caption = fileType === 'deal' ? `📄 ДОГОВОР клиента #${c.number} - ${c.name}` : `📎 ${fileData.name} | Клиент #${c.number} - ${c.name}`;
        fd.append('caption', caption);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {method: 'POST', body: fd});
    } catch(e) { console.log('Ошибка отправки файла:', e); }
}

function setFilter(s) { currentFilter = s; document.querySelectorAll('.filter-btn').forEach((btn,i)=>btn.classList.toggle('active', btn.innerText === s || (s==='all' && btn.innerText==='Все'))); showList(); }
function getFiltered() { return currentFilter === 'all' ? clients : clients.filter(c => c.status === currentFilter); }

// ФОРМА ДОБАВЛЕНИЯ - БЕЗ ПОЛЯ СУММЫ!
function showAdd() {
    document.getElementById('content').innerHTML = `<div class="card"><div class="number-badge">Новый клиент → #${formatNumber(nextNumber)}</div>
        <div class="input-group"><label>📛 Имя *</label><input id="name" placeholder="Ислом Каримов"></div>
        <div class="input-group"><label>📞 Телефон</label><input id="phone" placeholder="+998 90 123 45 67"></div>
        <div class="input-group"><label>📐 Площадь (м²)</label><input id="area" placeholder="75" type="number"></div>
        <div class="input-group"><label>📍 Адрес</label><input id="address" placeholder="ул. Навои, 15"></div>
        <div class="input-group"><label>📌 Статус</label><select id="status"><option>Новый</option><option>В работе</option><option>Договор</option><option>Закрыт</option></select></div>
        <div class="input-group"><label>💬 Комментарий</label><textarea id="comment" rows="3" placeholder="Дополнительная информация..."></textarea></div>
        <div class="input-group"><label>📎 Файлы</label><input type="file" id="files" multiple accept=".pdf,.doc,.docx,.jpg,.png"></div>
        <button class="save-btn" onclick="add()">✅ Сохранить</button></div>`;
}

async function add() {
    let name = document.getElementById('name').value;
    if(!name) { alert('Введите имя клиента'); return; }
    
    let files = document.getElementById('files').files;
    let fileDataArray = [];
    for(let f of files) {
        let reader = new FileReader();
        let data = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(f); });
        fileDataArray.push({name: f.name, type: f.type, data: data});
    }
    
    let newClient = { 
        number: nextNumber,
        name: name,
        phone: document.getElementById('phone').value || '—',
        area: document.getElementById('area').value || '—',
        address: document.getElementById('address').value || '—',
        status: document.getElementById('status').value,
        price: '—',  // сумма пустая до подписания договора
        comment: document.getElementById('comment').value || '—',
        time: new Date().toLocaleString('ru-RU'),
        files: fileDataArray,
        dealFiles: [],
        dealSigned: false
    };
    
    clients.push(newClient);
    save();
    
    // Отправляем карточку в группу
    await sendFullCardToGroup(newClient, 'new');
    
    // Отправляем файлы
    for(let f of fileDataArray) {
        await sendFileToGroup(f, newClient, 'file');
    }
    
    nextNumber++;
    showList();
    alert(`✅ Клиент #${newClient.number} добавлен!`);
}

function showList() {
    let filtered = getFiltered();
    if(!filtered.length) { document.getElementById('content').innerHTML = '<div class="card empty-state">📭 Нет клиентов</div>'; return; }
    let html = '';
    for(let c of filtered) {
        let cls = c.status === 'Новый' ? 'status-new' : (c.status === 'В работе' ? 'status-work' : (c.status === 'Договор' ? 'status-deal' : 'status-closed'));
        html += `<div class="client-card" onclick="view(${c.number})">
            <div class="client-number">#${formatNumber(c.number)}</div>
            <div class="client-name">${c.name}</div>
            <div class="client-info">📞 ${c.phone} | 📐 ${c.area} м²</div>
            <div><span class="status-badge ${cls}">${c.status}</span></div>
            ${c.status === 'Договор' && c.price !== '—' ? `<div class="price-badge">💰 ${formatPrice(c.price)}</div>` : ''}
        </div>`;
    }
    document.getElementById('content').innerHTML = html;
}

function view(n) {
    let c = clients.find(x=>x.number===n);
    if(!c) { showList(); return; }
    
    let cls = c.status === 'Новый' ? 'status-new' : (c.status === 'В работе' ? 'status-work' : (c.status === 'Договор' ? 'status-deal' : 'status-closed'));
    let isDealLocked = c.status === 'Договор' && c.dealSigned;
    
    let filesHtml = '';
    if(c.files && c.files.length) {
        filesHtml = '<div class="file-list"><b>📎 Файлы:</b>';
        for(let f of c.files) filesHtml += `<div class="file-item"><span class="file-name">📄 ${f.name}</span><button class="delete-file" onclick="event.stopPropagation(); deleteFile(${n}, '${f.name}', 'files')">🗑️</button></div>`;
        filesHtml += '</div>';
    }
    
    let dealFilesHtml = '';
    if(c.dealFiles && c.dealFiles.length) {
        dealFilesHtml = '<div class="file-list deal-section"><b>📄 Договоры:</b>';
        for(let f of c.dealFiles) dealFilesHtml += `<div class="file-item"><span class="file-name">📑 ${f.name}</span><button class="delete-file" onclick="event.stopPropagation(); deleteFile(${n}, '${f.name}', 'dealFiles')">🗑️</button></div>`;
        dealFilesHtml += '</div>';
    }
    
    // ПОЛЯ ДЛЯ ПОДПИСАНИЯ ДОГОВОРА - появляются только при статусе "Договор"
    let dealSection = '';
    if(c.status === 'Договор' && !c.dealSigned) {
        dealSection = `<div class="deal-section">
            <div class="input-group"><label>💰 Сумма договора (сум)</label><input id="dealPrice" type="number" placeholder="Введите сумму"></div>
            <div class="input-group"><label>📄 Файл договора (PDF, DOC)</label><input type="file" id="dealFile" accept=".pdf,.doc,.docx"></div>
            <button class="save-btn" onclick="signDeal(${n})">✅ Подписать договор</button>
        </div>`;
    } else if(c.status === 'Договор' && c.dealSigned) {
        dealSection = `<div class="deal-section" style="border-color:#66ff88;">
            <label style="color:#66ff88;">✅ ДОГОВОР ПОДПИСАН</label>
            <p style="color:#ffd700;">💰 Сумма: ${formatPrice(c.price)}</p>
        </div>`;
    }
    
    let statusSelect = '';
    if(isDealLocked) {
        statusSelect = `<div class="deal-section" style="color:#ff6666;">🔒 Договор подписан — статус нельзя изменить</div>`;
    } else {
        statusSelect = `<select id="ns">
            <option ${c.status==='Новый' ? 'selected' : ''}>Новый</option>
            <option ${c.status==='В работе' ? 'selected' : ''}>В работе</option>
            <option ${c.status==='Договор' ? 'selected' : ''}>Договор</option>
            <option ${c.status==='Закрыт' ? 'selected' : ''}>Закрыт</option>
        </select>
        <button class="save-btn" onclick="changeStatus(${n})">🔄 Изменить статус</button>`;
    }
    
    document.getElementById('content').innerHTML = `<div class="card">
        <div class="number-badge">Клиент #${formatNumber(c.number)}</div>
        <h3>${c.name}</h3>
        <p>📞 ${c.phone}</p>
        <p>📐 ${c.area} м²</p>
        <p>📍 ${c.address}</p>
        <p><span class="status-badge ${cls}">${c.status}</span></p>
        <p>💬 ${c.comment}</p>
        <p>🕐 ${c.time}</p>
        ${filesHtml}${dealFilesHtml}
        ${dealSection}
        <div class="input-group"><label>📎 Добавить файл</label><input type="file" id="newFile" accept=".pdf,.doc,.docx,.jpg,.png"></div>
        <button class="upload-btn" onclick="addFile(${n})">📤 Добавить файл</button>
        ${statusSelect}
        ${!isDealLocked ? `<button class="upload-btn" style="background:#4a1a1a;color:#ff8888;margin-top:10px;" onclick="deleteClient(${n})">🗑️ Удалить клиента</button>` : ''}
        <button class="upload-btn" style="background:#2a2a2a;margin-top:10px;" onclick="showList()">◀️ Назад</button>
    </div>`;
}

async function signDeal(n) {
    let c = clients.find(x=>x.number===n);
    let price = document.getElementById('dealPrice').value;
    let file = document.getElementById('dealFile').files[0];
    
    if(!price && !file) { 
        alert('Введите сумму или прикрепите файл договора'); 
        return; 
    }
    
    if(price) c.price = price;
    
    if(file) {
        let reader = new FileReader();
        let data = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
        let fileData = {name: file.name, type: file.type, data: data};
        if(!c.dealFiles) c.dealFiles = [];
        c.dealFiles.push(fileData);
        await sendFileToGroup(fileData, c, 'deal');
    }
    
    c.dealSigned = true;
    save();
    
    // Отправляем карточку с договором
    await sendFullCardToGroup(c, 'deal');
    
    alert(`✅ Договор подписан! Сумма: ${formatPrice(c.price)}`);
    view(n);
}

async function changeStatus(n) {
    let c = clients.find(x=>x.number===n);
    let oldStatus = c.status;
    let newStatus = document.getElementById('ns').value;
    
    if(oldStatus === newStatus) { view(n); return; }
    
    c.status = newStatus;
    save();
    
    // Отправляем обновлённую карточку
    await sendFullCardToGroup(c, 'status');
    
    alert(`✅ Статус изменён с "${oldStatus}" на "${newStatus}"!`);
    
    if(newStatus === 'Договор') {
        alert('📄 Теперь можно подписать договор: укажите сумму и прикрепите файл');
    }
    view(n);
}

async function addFile(n) {
    let c = clients.find(x=>x.number===n);
    let file = document.getElementById('newFile').files[0];
    if(!file) { alert('Выберите файл'); return; }
    
    let reader = new FileReader();
    let data = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
    let fileData = {name: file.name, type: file.type, data: data};
    
    if(!c.files) c.files = [];
    c.files.push(fileData);
    save();
    
    await sendFileToGroup(fileData, c, 'file');
    alert(`✅ Файл добавлен и отправлен в группу!`);
    view(n);
}

function deleteFile(n, fileName, type) {
    let c = clients.find(x=>x.number===n);
    if(c.status === 'Договор' && c.dealSigned) { 
        alert('❌ Нельзя удалять файлы у подписанного договора'); 
        return; 
    }
    c[type] = c[type].filter(f => f.name !== fileName);
    save();
    view(n);
}

function deleteClient(n) {
    let c = clients.find(x=>x.number===n);
    if(c.status === 'Договор' && c.dealSigned) { 
        alert('❌ Нельзя удалить клиента с подписанным договором'); 
        return; 
    }
    if(confirm(`Удалить клиента #${c.number} ${c.name}?`)) {
        clients = clients.filter(x=>x.number!==n);
        save();
        showList();
    }
}

function showStats() {
    let total = clients.length, areaTotal = 0, priceTotal = 0;
    clients.forEach(c => { 
        areaTotal += parseFloat(c.area) || 0; 
        if(c.price && c.price !== '—') priceTotal += parseFloat(c.price) || 0; 
    });
    document.getElementById('content').innerHTML = `<div class="card"><h3 style="text-align:center;color:#ffd700;">📊 СТАТИСТИКА</h3>
        <p>👥 Всего клиентов: <b style="color:#ffd700;">${total}</b></p>
        <p>📐 Общая площадь: <b>${areaTotal} м²</b></p>
        <p>💰 Общая сумма договоров: <b style="color:#ffd700;">${formatPrice(priceTotal)}</b></p>
        <button class="save-btn" style="background:#2a2a2a;color:white;" onclick="showList()">◀️ Назад</button></div>`;
}

load(); 
showList();
</script>
</body>
</html>
