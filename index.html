<!DOCTYPE html>
<html>
<head>
    <title>Neostyle CRM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; padding: 20px; font-family: Arial, sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; }
        .header { background: #111; border-radius: 28px; padding: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .logo span:first-child { color: #fff; }
        .logo span:last-child { color: #ffd700; }
        .sub { font-size: 12px; color: #aaa; margin-top: 5px; }
        
        .role-badge { background: #ffd700; color: #111; border-radius: 20px; padding: 5px 12px; font-size: 12px; display: inline-block; }
        .filter-buttons { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { flex: 1; background: #1a1a1a; border: none; padding: 10px; border-radius: 30px; color: #ccc; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: #ffd700; color: #111; }
        .menu-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .menu-btn { flex: 1; background: #1a1a1a; border: none; padding: 14px; border-radius: 16px; color: white; cursor: pointer; }
        
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: #ffd700; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .fab:active { transform: scale(0.95); }
        .fab span { font-size: 32px; font-weight: bold; color: #111; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1001; justify-content: center; align-items: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: #111; border-radius: 28px; max-width: 500px; width: 100%; max-height: 90%; overflow-y: auto; border: 1px solid #333; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .modal-header h3 { color: #ffd700; }
        .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: #aaa; }
        
        .card { background: #111; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #333; }
        .client-card { background: #111; border-radius: 20px; padding: 16px; margin-bottom: 12px; cursor: pointer; border-left: 4px solid #ffd700; }
        .client-name { font-size: 18px; font-weight: bold; color: #fff; }
        .client-number { background: #ffd700; color: #111; border-radius: 20px; padding: 4px 12px; font-size: 12px; display: inline-block; }
        .client-info { font-size: 14px; color: #ccc; margin-top: 8px; }
        .author-info { font-size: 11px; color: #ffd700; margin-top: 8px; border-top: 1px solid #333; padding-top: 8px; }
        
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-new { background: #1a3a5c; color: #66ccff; }
        .status-work { background: #5c3a1a; color: #ffcc66; }
        .status-deal { background: #1a5c2a; color: #66ff88; }
        .status-closed { background: #3a3a3a; color: #ccc; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #ffd700; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #444; border-radius: 14px; background: #1a1a1a; color: #fff; font-size: 16px; }
        .save-btn { background: #ffd700; color: #111; border: none; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .quick-form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .quick-form-row .input-group { flex: 1; margin-bottom: 0; }
        
        .success-toast { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #1a3a1a; border-radius: 16px; padding: 12px; text-align: center; color: #66ff88; z-index: 1002; }
        .price-badge { background: #ffd700; color: #111; border-radius: 20px; padding: 4px 12px; font-size: 12px; display: inline-block; margin-top: 8px; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .number-badge { background: #ffd700; color: #111; border-radius: 30px; padding: 8px 16px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        hr { border-color: #333; margin: 20px 0; }
        p, h3 { color: #fff; }
        .deal-section { border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; }
        .profit-total { background: #1a3a1a; border-radius: 16px; padding: 12px; text-align: center; margin-top: 10px; }
        .manager-select { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 15px; border: 1px solid #333; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo"><span>NEO</span><span>STYLE</span></div>
        <div class="sub">ARCHITECTURAL GROUP</div>
    </div>
    
    <div style="background:#1a1a1a; border-radius: 30px; padding: 10px 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
        <span style="color:#ccc;">👤</span>
        <span class="role-badge" id="userInfo">Загрузка...</span>
    </div>
    
    <div class="filter-buttons">
        <button class="filter-btn active" onclick="setFilter('all')">Все</button>
        <button class="filter-btn" onclick="setFilter('Новый')">Новые</button>
        <button class="filter-btn" onclick="setFilter('В работе')">В работе</button>
        <button class="filter-btn" onclick="setFilter('Договор')">Договор</button>
        <button class="filter-btn" onclick="setFilter('Закрыт')">Закрыты</button>
    </div>
    
    <div class="menu-buttons">
        <button class="menu-btn" onclick="showList()">Список</button>
        <button class="menu-btn" onclick="showStats()">Статистика</button>
    </div>
    <div id="content"></div>
</div>

<button class="fab" onclick="openQuickForm()"><span>+</span></button>

<div id="quickModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>➕ Новый клиент</h3><button class="close-modal" onclick="closeQuickForm()">✕</button></div>
        <div class="number-badge" id="quickNumber">Новый клиент → #1</div>
        
        <!-- ВЫБОР МЕНЕДЖЕРА (только для админа) -->
        <div id="managerSelectDiv" class="manager-select" style="display:none;">
            <label>👥 Назначить менеджера:</label>
            <select id="managerSelect">
                <option value="954221831">👑 Админ</option>
                <option value="sultan">👤 Султан</option>
                <option value="abdulloh">👤 Абдуллох</option>
                <option value="shahzod">👤 Шахзод</option>
            </select>
        </div>
        
        <div class="input-group"><label>📛 Имя *</label><input id="quickName" placeholder="Ислом Каримов" autofocus></div>
        <div class="quick-form-row"><div class="input-group"><label>📞 Телефон</label><input id="quickPhone" placeholder="+998 90 123 45 67"></div><div class="input-group"><label>📐 Площадь</label><input id="quickArea" placeholder="75" type="number"></div></div>
        <div class="input-group"><label>📍 Адрес</label><input id="quickAddress" placeholder="ул. Навои, 15"></div>
        <div class="input-group"><label>📌 Статус</label>
            <select id="quickStatus">
                <option value="Новый">Новый</option>
                <option value="В работе">В работе</option>
            </select>
        </div>
        <div class="input-group"><label>💬 Комментарий</label><textarea id="quickComment" rows="2" placeholder="Дополнительная информация..."></textarea></div>
        <div class="input-group"><label>📎 Файлы</label><input type="file" id="quickFiles" multiple accept=".pdf,.doc,.docx,.jpg,.png,.mp3,.m4a,.ogg,.wav"></div>
        <button class="save-btn" onclick="quickAdd()">✅ Добавить клиента</button>
    </div>
</div>

<div id="toast" style="display:none;" class="success-toast"></div>

<script>
// ========== ТВОЙ АДМИН ID ==========
const ADMIN_ID = 954221831;

// ========== СПИСОК МЕНЕДЖЕРОВ ==========
const MANAGERS = {
    '954221831': { name: 'Админ', shortName: '👑 Админ', isAdmin: true },
    'sultan': { name: 'Султан', shortName: '👤 Султан', isAdmin: false },
    'abdulloh': { name: 'Абдуллох', shortName: '👤 Абдуллох', isAdmin: false },
    'shahzod': { name: 'Шахзод', shortName: '👤 Шахзод', isAdmin: false }
};

// ========== ТЕКУЩИЙ ПОЛЬЗОВАТЕЛЬ ==========
let currentUser = {
    id: null,
    name: null,
    isAdmin: false
};

// ========== ДАННЫЕ ==========
let clients = [], nextNumber = 1, currentFilter = 'all';

// ========== ПОЛУЧАЕМ ДАННЫЕ ИЗ TELEGRAM ==========
function initUser() {
    // Получаем данные из Telegram WebApp
    if(window.Telegram && Telegram.WebApp) {
        let initData = Telegram.WebApp.initDataUnsafe;
        if(initData && initData.user) {
            currentUser.id = initData.user.id;
            currentUser.name = initData.user.first_name || (initData.user.username ? '@'+initData.user.username : 'Пользователь');
            // ТОЛЬКО ЕСЛИ ID СОВПАДАЕТ С ADMIN_ID — ТОГДА АДМИН
            currentUser.isAdmin = (String(currentUser.id) === String(ADMIN_ID));
        } else {
            currentUser.id = 'unknown';
            currentUser.name = 'Гость';
            currentUser.isAdmin = false;
        }
    } else {
        // Вне Telegram — для теста (никто не админ)
        currentUser.id = 'browser_' + Date.now();
        currentUser.name = 'Гость';
        currentUser.isAdmin = false;
    }
    
    let roleText = '';
    if(currentUser.isAdmin) {
        roleText = '👑 АДМИН';
    } else {
        let manager = MANAGERS[currentUser.id];
        if(manager) {
            roleText = manager.shortName;
        } else {
            roleText = '👤 МЕНЕДЖЕР';
        }
    }
    document.getElementById('userInfo').innerHTML = `${currentUser.name} ${roleText}`;
    
    // Показываем выбор менеджера только для админа
    if(currentUser.isAdmin) {
        let div = document.getElementById('managerSelectDiv');
        if(div) div.style.display = 'block';
    }
}

// ========== ФИЛЬТРАЦИЯ КЛИЕНТОВ ==========
function getFilteredClients() {
    let filtered = clients;
    if(currentFilter !== 'all') {
        filtered = filtered.filter(c => c.status === currentFilter);
    }
    // Если не админ — показываем только своих клиентов
    if(!currentUser.isAdmin) {
        filtered = filtered.filter(c => String(c.authorId) === String(currentUser.id));
    }
    return filtered;
}

function formatNumber(num) { 
    if(!num) return '0';
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); 
}
function formatPrice(priceSum) {
    if(!priceSum || priceSum === '—') return '—';
    let num = parseFloat(priceSum);
    return num.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " сум";
}

function load() { 
    let s = localStorage.getItem('clients'); 
    if(s) clients = JSON.parse(s); 
    let n = localStorage.getItem('nextNumber'); 
    if(n) nextNumber = parseInt(n); 
}
function save() { 
    localStorage.setItem('clients', JSON.stringify(clients)); 
    localStorage.setItem('nextNumber', nextNumber);
}

const CHAT_ID = -1003831665624;
const BOT_TOKEN = "8628159718:AAH8tPnTX0fReDzpByMG44A-iF6HG-Pm5-8";

async function sendToGroup(c, eventType = 'new') {
    let title = '';
    if(eventType === 'new') title = `🆕 НОВЫЙ КЛИЕНТ #${c.number}`;
    else if(eventType === 'status') title = `🔄 ИЗМЕНЕНИЕ СТАТУСА`;
    else if(eventType === 'deal') title = `✅ ПОДПИСАН ДОГОВОР #${c.number}`;
    
    let managerName = MANAGERS[c.authorId] ? MANAGERS[c.authorId].name : (c.authorName || 'Неизвестный');
    let message = `${title}\n\n📛 Имя: ${c.name}\n📞 Телефон: ${c.phone}\n📐 Площадь: ${c.area} м²\n📍 Адрес: ${c.address}\n📌 Статус: ${c.status}`;
    if(c.priceSum && c.priceSum !== '—') message += `\n💰 Сумма: ${formatPrice(c.priceSum)}`;
    message += `\n💬 Комментарий: ${c.comment}\n\n👤 Менеджер: ${managerName}\n🕐 ${new Date().toLocaleString()}`;
    let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
    try { await fetch(url); } catch(e) { console.log(e); }
}

async function sendFileToGroup(fileData, clientNumber, clientName) {
    try {
        let byteChars = atob(fileData.data.split(',')[1]);
        let bytes = new Uint8Array(byteChars.length);
        for(let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
        let blob = new Blob([bytes], {type: fileData.type});
        let fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('document', blob, fileData.name);
        fd.append('caption', `📎 ${fileData.name} | Клиент #${clientNumber} - ${clientName}`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {method: 'POST', body: fd});
    } catch(e) { console.log(e); }
}

function updateQuickNumber() { 
    let badge = document.getElementById('quickNumber'); 
    if(badge) badge.innerHTML = `Новый клиент → #${formatNumber(nextNumber)}`; 
}
function openQuickForm() { 
    document.getElementById('quickModal').classList.add('show'); 
    document.getElementById('quickName').focus(); 
    updateQuickNumber(); 
}
function closeQuickForm() { document.getElementById('quickModal').classList.remove('show'); }
function showToast(msg) { let t = document.getElementById('toast'); t.innerHTML = msg; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 3000); }

async function quickAdd() {
    let name = document.getElementById('quickName').value;
    if(!name) { alert('Введите имя клиента'); return; }
    
    let files = document.getElementById('quickFiles').files;
    let fileDataArray = [];
    for(let f of files) {
        let reader = new FileReader();
        let data = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(f); });
        fileDataArray.push({name: f.name, type: f.type, data: data});
    }
    
    // Определяем кто добавляет
    let authorId, authorName;
    if(currentUser.isAdmin && document.getElementById('managerSelect') && document.getElementById('managerSelect').value) {
        authorId = document.getElementById('managerSelect').value;
        authorName = MANAGERS[authorId] ? MANAGERS[authorId].name : authorId;
    } else {
        authorId = currentUser.id;
        authorName = currentUser.name;
    }
    
    let newClient = {
        number: nextNumber,
        name: name,
        phone: document.getElementById('quickPhone').value || '—',
        area: document.getElementById('quickArea').value || '—',
        address: document.getElementById('quickAddress').value || '—',
        status: document.getElementById('quickStatus').value,
        priceSum: '—',
        comment: document.getElementById('quickComment').value || '—',
        time: new Date().toLocaleString('ru-RU'),
        files: fileDataArray,
        dealFiles: [],
        dealSigned: false,
        authorId: authorId,
        authorName: authorName
    };
    
    clients.push(newClient);
    save();
    await sendToGroup(newClient, 'new');
    for(let f of fileDataArray) await sendFileToGroup(f, newClient.number, newClient.name);
    nextNumber++;
    save();
    
    closeQuickForm();
    showToast(`✅ Клиент #${formatNumber(newClient.number)} добавлен!`);
    
    document.getElementById('quickName').value = '';
    document.getElementById('quickPhone').value = '';
    document.getElementById('quickArea').value = '';
    document.getElementById('quickAddress').value = '';
    document.getElementById('quickComment').value = '';
    document.getElementById('quickFiles').value = '';
    updateQuickNumber();
    
    showList();
}

function setFilter(s) { 
    currentFilter = s; 
    document.querySelectorAll('.filter-btn').forEach((btn,i)=>btn.classList.toggle('active', btn.innerText === s || (s==='all' && btn.innerText==='Все'))); 
    showList(); 
}

function showList() {
    let filtered = getFilteredClients();
    if(!filtered.length) { 
        document.getElementById('content').innerHTML = '<div class="card empty-state">📭 Нет клиентов</div>'; 
        return; 
    }
    let html = '';
    for(let c of filtered) {
        let cls = c.status === 'Новый' ? 'status-new' : (c.status === 'В работе' ? 'status-work' : (c.status === 'Договор' ? 'status-deal' : 'status-closed'));
        let managerDisplay = MANAGERS[c.authorId] ? MANAGERS[c.authorId].shortName : (c.authorName || c.authorId);
        html += `<div class="client-card" onclick="viewClient(${c.number})">
            <div class="client-number">#${formatNumber(c.number)}</div>
            <div class="client-name">${c.name}</div>
            <div class="client-info">📞 ${c.phone} | 📐 ${c.area} м²</div>
            <div><span class="status-badge ${cls}">${c.status}</span></div>
            ${!currentUser.isAdmin ? `<div class="author-info">👤 Менеджер: ${managerDisplay}</div>` : `<div class="author-info">👤 Менеджер: ${managerDisplay}</div>`}
        </div>`;
    }
    document.getElementById('content').innerHTML = html;
}

async function changeClientStatus(number, newStatus) {
    let c = clients.find(x => x.number === number);
    if(!c) return;
    let oldStatus = c.status;
    if(oldStatus === newStatus) return;
    
    // Проверка прав
    if(!currentUser.isAdmin && String(c.authorId) !== String(currentUser.id)) {
        showToast(`❌ Вы можете менять статус только у своих клиентов!`);
        viewClient(number);
        return;
    }
    
    // Если договор подписан — только на Закрыт
    if(oldStatus === 'Договор' && c.dealSigned && newStatus !== 'Закрыт') {
        showToast(`❌ Договор подписан! Можно изменить только на "Закрыт"`);
        viewClient(number);
        return;
    }
    
    c.status = newStatus;
    save();
    await sendToGroup(c, 'status');
    showToast(`✅ Статус клиента #${c.number} изменён с "${oldStatus}" на "${newStatus}"`);
    
    // Если статус стал Договор — показываем карточку заново с формой подписания
    if(newStatus === 'Договор') {
        viewClient(number);
    } else {
        showList();
    }
}

function viewClient(n) {
    let c = clients.find(x=>x.number===n);
    if(!c) { showList(); return; }
    
    // Проверка прав
    if(!currentUser.isAdmin && String(c.authorId) !== String(currentUser.id)) {
        showToast(`❌ Это не ваш клиент!`);
        showList();
        return;
    }
    
    let cls = c.status === 'Новый' ? 'status-new' : (c.status === 'В работе' ? 'status-work' : (c.status === 'Договор' ? 'status-deal' : 'status-closed'));
    
    // Статусы для выбора
    let statusOptions = '';
    if(c.status === 'Договор' && c.dealSigned) {
        statusOptions = `<select id="statusSelect">
            <option ${c.status==='Договор' ? 'selected' : ''}>Договор</option>
            <option ${c.status==='Закрыт' ? 'selected' : ''}>Закрыт</option>
        </select>`;
    } else {
        statusOptions = `<select id="statusSelect">
            <option ${c.status==='Новый' ? 'selected' : ''}>Новый</option>
            <option ${c.status==='В работе' ? 'selected' : ''}>В работе</option>
            <option ${c.status==='Договор' ? 'selected' : ''}>Договор</option>
            <option ${c.status==='Закрыт' ? 'selected' : ''}>Закрыт</option>
        </select>`;
    }
    
    // Форма подписания договора (только если статус Договор и не подписан)
    let dealSection = '';
    if(c.status === 'Договор' && !c.dealSigned) {
        dealSection = `<div class="deal-section" id="dealSignSection">
            <div class="input-group"><label>💰 Сумма договора (сум)</label><input id="dealPrice" type="number" placeholder="Введите сумму"></div>
            <div class="input-group"><label>📄 Файл договора (PDF, DOC, DOCX)</label><input type="file" id="dealFile" accept=".pdf,.doc,.docx"></div>
            <button class="save-btn" onclick="signDeal(${c.number})">✅ Подписать договор</button>
        </div>`;
    } else if(c.status === 'Договор' && c.dealSigned) {
        dealSection = `<div class="deal-section" style="border-color:#66ff88;">
            <label style="color:#66ff88;">✅ ДОГОВОР ПОДПИСАН</label>
            ${currentUser.isAdmin ? `<p style="color:#ffd700;">💰 Сумма: ${formatPrice(c.priceSum)}</p>` : '<p style="color:#888;">💰 Сумма: скрыта</p>'}
        </div>`;
    }
    
    let managerDisplay = MANAGERS[c.authorId] ? MANAGERS[c.authorId].shortName : (c.authorName || c.authorId);
    
    document.getElementById('content').innerHTML = `<div class="card">
        <div class="number-badge">Клиент #${formatNumber(c.number)}</div>
        <h3>${c.name}</h3>
        <p>📞 ${c.phone}</p><p>📐 ${c.area} м²</p><p>📍 ${c.address}</p>
        <p><span class="status-badge ${cls}" style="font-size:16px;padding:8px 16px;">${c.status}</span></p>
        ${currentUser.isAdmin && c.priceSum !== '—' ? `<p>💰 ${formatPrice(c.priceSum)}</p>` : ''}
        <p>💬 ${c.comment}</p><p>🕐 ${c.time}</p>
        <div class="author-info">👤 Менеджер: ${managerDisplay}</div>
        ${dealSection}
        <div class="input-group"><label>📌 Изменить статус</label>${statusOptions}</div>
        <button class="save-btn" onclick="changeClientStatus(${c.number}, document.getElementById('statusSelect').value)">🔄 Изменить статус</button>
        <button class="save-btn" style="background:#2a2a2a;margin-top:10px;" onclick="showList()">◀️ Назад</button>
    </div>`;
}

async function signDeal(n) {
    let c = clients.find(x=>x.number===n);
    let price = document.getElementById('dealPrice').value;
    let file = document.getElementById('dealFile').files[0];
    
    if(!price && !file) { 
        alert('Введите сумму или прикрепите файл договора'); 
        return; 
    }
    if(price) c.priceSum = price;
    if(file) {
        let reader = new FileReader();
        let data = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
        let fileData = {name: file.name, type: file.type, data: data};
        if(!c.dealFiles) c.dealFiles = [];
        c.dealFiles.push(fileData);
        await sendFileToGroup(fileData, c.number, c.name);
    }
    c.dealSigned = true;
    save();
    await sendToGroup(c, 'deal');
    showToast(`✅ Договор подписан! Сумма: ${formatPrice(c.priceSum)}`);
    viewClient(n);
}

function showStats() {
    let visibleClients = getFilteredClients();
    let total = visibleClients.length, areaTotal = 0, totalProfit = 0;
    let newC=0, workC=0, dealC=0, closedC=0;
    
    visibleClients.forEach(c => {
        areaTotal += parseFloat(c.area) || 0;
        if(c.status === 'Новый') newC++;
        else if(c.status === 'В работе') workC++;
        else if(c.status === 'Договор') dealC++;
        else if(c.status === 'Закрыт') { 
            closedC++; 
            if(c.priceSum !== '—') totalProfit += parseFloat(c.priceSum) || 0; 
        }
    });
    
    let roleText = currentUser.isAdmin ? 'АДМИН' : 'МЕНЕДЖЕР';
    
    let profitHtml = '';
    if(currentUser.isAdmin) {
        profitHtml = `<div class="profit-total"><label>💰 ОБЩАЯ ПРИБЫЛЬ</label><div style="font-size:28px;font-weight:bold;color:#66ff88;">${formatPrice(totalProfit)}</div></div>`;
    } else {
        profitHtml = `<div class="profit-total"><label>💰 ПРИБЫЛЬ</label><div style="font-size:28px;font-weight:bold;color:#888;">Доступно только админу</div></div>`;
    }
    
    document.getElementById('content').innerHTML = `<div class="card">
        <h3 style="text-align:center;color:#ffd700;">📊 СТАТИСТИКА (${roleText})</h3>
        ${profitHtml}
        <p>👥 Всего: <b style="color:#ffd700;">${total}</b> | 📐 Площадь: <b>${areaTotal} м²</b></p>
        <hr>
        <div><span>🟢 Новые: ${newC}</span> | <span>🟡 В работе: ${workC}</span> | <span>🔵 Договор: ${dealC}</span> | <span>✅ Закрыты: ${closedC}</span></div>
        <button class="save-btn" style="background:#2a2a2a;color:white;margin-top:20px;" onclick="showList()">◀️ Назад</button>
    </div>`;
}

// ЗАПУСК
initUser();
load();
showList();
</script>
